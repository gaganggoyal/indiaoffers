  <rect x="12" y="26" width="40" height="26" rx="7" fill="#ffffff"/>
  <rect x="12" y="30.5" width="40" height="2" fill="#bfdbfe"/>
  <rect x="42" y="34.5" width="10" height="11" rx="5.5" fill="#dbeafe"/>
  <circle cx="47" cy="40" r="2.4" fill="#f59e0b"/>

  <!-- wordmark -->
  <text x="74" y="43.5"
        font-family="-apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif"
        font-size="30" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#2563eb">India</tspan><tspan fill="#f59e0b">Offers</tspan><tspan fill="#6b7280" font-size="22" font-weight="700">.in</tspan>
