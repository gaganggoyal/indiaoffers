# IndiaOffers.in — nginx reverse proxy in front of the Node app (127.0.0.1:3000).
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/indiaoffers
#   sudo ln -s /etc/nginx/sites-available/indiaoffers /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: run `sudo certbot --nginx -d indiaoffers.in -d www.indiaoffers.in` AFTER
# the plain-HTTP server below is live. Certbot rewrites this file to add the
# 443 block, the certificate paths, and the http→https redirect automatically.
# HTTPS is required in production: secure cookies and the PWA install prompt
# only work over TLS.

upstream indiaoffers_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name indiaoffers.in www.indiaoffers.in;

    # Let's Encrypt HTTP-01 challenge (leave in place after certbot runs).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Reasonable upload ceiling (matches the app's 1mb JSON limit; bump if you
    # add larger image uploads via multer).
    client_max_body_size 8m;

    # Compress text responses; the app doesn't gzip itself.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    location / {
        proxy_pass http://indiaoffers_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # `trust proxy` is on in app.js — this header is what makes secure
        # cookies and req.protocol==='https' work correctly behind nginx.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
    }
}
